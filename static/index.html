<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DealBot AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f1a;
      border: 1px solid #3a3a5c;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input[type="number"]:focus {
      border-color: #7c3aed;
    }

    button {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      text-align: center;
      color: #7c3aed;
      font-size: 0.9rem;
      margin-top: 12px;
      min-height: 20px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #7c3aed;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #result { width: 100%; max-width: 560px; display: none; }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .badge.deal { background: #14532d; color: #4ade80; }
    .badge.no-deal { background: #450a0a; color: #f87171; }

    .final-price {
      font-size: 2rem;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      color: #888;
      padding: 8px 12px;
      border-bottom: 1px solid #2a2a45;
      font-weight: 500;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #1e1e35;
    }

    tr:last-child td { border-bottom: none; }

    .buyer-val { color: #60a5fa; font-weight: 600; }
    .seller-val { color: #f472b6; font-weight: 600; }

    .section-title {
      font-size: 0.8rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      margin-top: 24px;
    }

    .eval-box {
      background: #0f0f1a;
      border: 1px solid #2a2a45;
      border-radius: 10px;
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #ccc;
    }

    .votes-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .vote-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .vote-accept { background: #14532d; color: #4ade80; }
    .vote-reject { background: #450a0a; color: #f87171; }
    .vote-other  { background: #1e1b4b; color: #a5b4fc; }
  </style>
</head>
<body>

  <h1>🤖 DealBot AI</h1>
  <p class="subtitle">AI-powered multi-agent price negotiation</p>

  <div class="card">
    <label>Buyer's Maximum Price ($)</label>
    <input type="number" id="maxPrice" value="1000" min="1" />

    <label>Seller's Minimum Price ($)</label>
    <input type="number" id="minPrice" value="500" min="1" />

    <button id="runBtn" onclick="runNegotiation()">▶ Start Negotiation</button>
    <div id="status"></div>
  </div>

  <div class="card" id="result">
    <div id="badgeArea"></div>
    <div id="finalPriceArea"></div>

    <div class="section-title">Negotiation Rounds</div>
    <table>
      <thead>
        <tr>
          <th>Round</th>
          <th>🔵 Buyer Offer</th>
          <th>🔴 Seller Offer</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>

    <div id="evalSection" style="display:none">
      <div class="section-title">AI Evaluation</div>
      <div class="eval-box" id="evalText"></div>
    </div>

    <div id="votesSection" style="display:none">
      <div class="section-title">Agent Votes</div>
      <div class="votes-row" id="votesRow"></div>
    </div>
  </div>

  <script>
    async function runNegotiation() {
      const maxPrice = document.getElementById('maxPrice').value;
      const minPrice = document.getElementById('minPrice').value;
      const btn = document.getElementById('runBtn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      if (!maxPrice || !minPrice || Number(maxPrice) <= Number(minPrice)) {
        status.innerHTML = '⚠️ Max price must be greater than min price.';
        return;
      }

      btn.disabled = true;
      result.style.display = 'none';
      status.innerHTML = '<span class="spinner"></span> Negotiating... please wait';

      try {
        const res = await fetch(`/negotiate?max_price=${maxPrice}&min_price=${minPrice}`);
        const data = await res.json();

        if (data.error) {
          status.innerHTML = `❌ Error: ${data.error.split('.')[0]}`;
          btn.disabled = false;
          return;
        }

        status.innerHTML = '';
        renderResult(data);
        result.style.display = 'block';
      } catch (e) {
        status.innerHTML = '❌ Could not reach server.';
      }

      btn.disabled = false;
    }

    function renderResult(data) {
      // Badge
      const badgeArea = document.getElementById('badgeArea');
      badgeArea.innerHTML = data.agreement
        ? '<span class="badge deal">✅ Deal Reached</span>'
        : '<span class="badge no-deal">❌ No Deal</span>';

      // Final price
      const fp = document.getElementById('finalPriceArea');
      fp.innerHTML = data.agreement
        ? `<div class="final-price">$${Number(data.final_price).toFixed(2)}</div>`
        : '';

      // History table
      const tbody = document.getElementById('historyBody');
      tbody.innerHTML = '';
      for (const row of data.history) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>Round ${row.round}</td>
          <td class="buyer-val">$${Number(row.buyer).toFixed(2)}</td>
          <td class="seller-val">$${Number(row.seller).toFixed(2)}</td>`;
        tbody.appendChild(tr);
      }

      // Evaluation
      const evalSection = document.getElementById('evalSection');
      if (data.evaluation) {
        document.getElementById('evalText').innerText = data.evaluation;
        evalSection.style.display = 'block';
      } else {
        evalSection.style.display = 'none';
      }

      // Votes
      const votesSection = document.getElementById('votesSection');
      if (data.votes && data.votes.length) {
        const votesRow = document.getElementById('votesRow');
        votesRow.innerHTML = '';
        data.votes.forEach((v, i) => {
          const chip = document.createElement('span');
          const lower = v.toLowerCase();
          chip.className = 'vote-chip ' + (lower.includes('accept') ? 'vote-accept' : lower.includes('reject') ? 'vote-reject' : 'vote-other');
          chip.innerText = `Agent ${i+1}: ${v}`;
          votesRow.appendChild(chip);
        });
        votesSection.style.display = 'block';
      } else {
        votesSection.style.display = 'none';
      }
    }
  </script>
</body>
</html>
